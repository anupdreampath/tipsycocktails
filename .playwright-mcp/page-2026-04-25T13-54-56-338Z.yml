          - generic [ref=e576]: Can I have my booking outside?
          - generic [ref=e577]: +
        - paragraph [ref=e578]: Yes, outdoor bookings are possible, weather permitting. Ideally, access to a sink and cold water tap is preferred, but we can adapt if informed in advance.
      - generic [ref=e579]:
