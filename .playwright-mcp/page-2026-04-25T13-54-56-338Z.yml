          - generic [ref=e541]: −
        - paragraph [ref=e543]: Yes, you are welcome to select the cocktails for your masterclass and for bar hire from our menu. Please provide your choices to us at least 10 days prior to the event.
      - generic [ref=e544]:
        - button "Can I still make a booking if I don't know the full address of my venue?" [ref=e545] [cursor=pointer]:
          - generic [ref=e546]: Can I still make a booking if I don't know the full address of my venue?
          - generic [ref=e547]: +
        - paragraph [ref=e548]: Yes, you can still make a booking. We initially require the general area of the event to provide an accurate quote. The full address can be confirmed a few days before the event.
      - generic [ref=e549]:
        - button "What do I need to provide?" [ref=e550] [cursor=pointer]:
          - generic [ref=e551]: What do I need to provide?
          - generic [ref=e552]: +
        - paragraph [ref=e553]: All we require is a suitable table space — we'll take care of everything else. Access to a nearby sink is ideal, but we can make alternative arrangements if informed in advance.
      - generic [ref=e554]:
        - button "Do you provide any other drinks other than cocktails for my bar hire?" [ref=e555] [cursor=pointer]:
          - generic [ref=e556]: Do you provide any other drinks other than cocktails for my bar hire?
          - generic [ref=e557]: +
        - paragraph [ref=e558]: We specialise in cocktails and do not supply other beverages. However, if you provide additional drinks and appropriate glassware (e.g. gin & tonic, bottled beers, wine), we are happy to serve them to your guests.
      - generic [ref=e559]:
        - button "What if some of my guests don't drink?" [ref=e560] [cursor=pointer]:
          - generic [ref=e561]: What if some of my guests don't drink?
          - generic [ref=e562]: +
        - paragraph [ref=e563]: We offer a selection of mocktails, and we can also prepare cocktails using alcohol-free spirits to accommodate non-drinking guests.
      - generic [ref=e564]:
        - button "When will the bartender arrive?" [ref=e565] [cursor=pointer]:
          - generic [ref=e566]: When will the bartender arrive?
          - generic [ref=e567]: +
        - paragraph [ref=e568]: Our bartender will typically arrive approximately 30 minutes before the start time to set up. This setup time does not reduce your booked service time. We also require around 30 minutes after the event to clear away.
      - generic [ref=e569]:
