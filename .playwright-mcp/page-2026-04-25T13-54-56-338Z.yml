          - generic [ref=e581]: Can I book at short notice?
          - generic [ref=e582]: +
        - paragraph [ref=e583]: Absolutely. For bookings made within 14 days of the event, we recommend contacting us via email to confirm availability before booking. Cocktail selections will also need to be confirmed at the time of booking if less than 10 days' notice is given, and full payment will need to be made to confirm your booking.
      - generic [ref=e584]:
